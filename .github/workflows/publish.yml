name: Publish Package

on:
  release:
    types: [published]

jobs:
  publish:
    if: github.event.release.prerelease == false
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      # npm trusted publishing exchanges the job OIDC identity for a short-lived publish credential.
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # npm trusted publishing requires npm 11.5.1+, which is satisfied by the Node 24 runner toolchain.
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "${VERSION}" || "${VERSION}" == "${GITHUB_REF_NAME}" ]]; then
            VERSION="${{ github.event.release.tag_name }}"
            VERSION="${VERSION#v}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install root dependencies
        run: npm ci

      - name: Align package version to release
        run: npm version "${{ steps.version.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Publish package to npm
        # Trusted publishing uses the GitHub OIDC identity from this job; no NODE_AUTH_TOKEN is required here.
        run: npm publish --access public
